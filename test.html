<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>viewer-360 — local test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    h1 { margin: 0 0 4px; font-size: 20px; }
    .subtitle { margin: 0 0 24px; color: #666; font-size: 14px; }

    .layout {
      display: grid;
      grid-template-columns: 600px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* ── Viewer ── */
    #viewer-wrap {
      width: 600px;
      height: 450px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
    }

    viewer-360 {
      width: 100%;
      height: 100%;
      /* theme override demo */
      --viewer-color-accent: #6c5ce7;
      --progress-bar-color: #6c5ce7;
    }

    /* ── Sidebar ── */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    .card h2 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: #888; }

    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; }

    button {
      padding: 6px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: background .15s;
    }
    button:hover  { background: #f0f0f0; }
    button:active { background: #e4e4e4; }
    button.primary { background: #6c5ce7; color: #fff; border-color: #6c5ce7; }
    button.primary:hover { background: #5a4bd1; }

    .prop-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .prop-row label { width: 140px; color: #555; flex-shrink: 0; }
    .prop-row input[type=range] { flex: 1; }
    .prop-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
    .prop-row span.val { width: 40px; text-align: right; color: #888; font-size: 12px; }

    /* ── Event log ── */
    #log {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 160px;
      overflow-y: auto;
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 6px;
      padding: 10px 12px;
    }
    #log .entry { margin-bottom: 3px; }
    #log .ts    { color: #888; margin-right: 6px; }
    #log .ev    { color: #9cdcfe; }
    #log .detail { color: #ce9178; }

    #status { font-size: 13px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>

<h1>viewer-360 — local test</h1>
<p class="subtitle">
  Make sure you've run <code>npm install &amp;&amp; npm run build</code> before opening this file.
</p>

<div class="layout">
  <!-- Viewer -->
  <div>
    <div id="viewer-wrap">
      <viewer-360 id="viewer"></viewer-360>
    </div>
    <p id="status">Generating frames…</p>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Imperative controls -->
    <div class="card">
      <h2>Imperative API</h2>
      <div class="btn-row">
        <button onclick="viewer.startAutoRotate()">▶ Start</button>
        <button onclick="viewer.stopAutoRotate()">⏸ Stop</button>
        <button onclick="viewer.reset()">↺ Reset</button>
        <button onclick="viewer.showFrame(1)" class="primary">Frame 1</button>
        <button onclick="viewer.showFrame(13)">Frame 13</button>
        <button onclick="viewer.showFrame(25)">Frame 25</button>
      </div>
    </div>

    <!-- Zoom -->
    <div class="card">
      <h2>Zoom</h2>
      <div class="btn-row">
        <button onclick="viewer.setZoom(1)">1×</button>
        <button onclick="viewer.setZoom(2)">2×</button>
        <button onclick="viewer.setZoom(4)">4×</button>
      </div>
    </div>

    <!-- Live props -->
    <div class="card">
      <h2>Live props</h2>

      <div class="prop-row">
        <label>speed (ms/frame)</label>
        <input type="range" min="30" max="300" value="100" id="speedSlider">
        <span class="val" id="speedVal">100</span>
      </div>

      <div class="prop-row">
        <label>show controls</label>
        <input type="checkbox" id="showControls" checked>
      </div>

      <div class="prop-row">
        <label>show zoom buttons</label>
        <input type="checkbox" id="showZoom" checked>
      </div>

      <div class="prop-row">
        <label>show fullscreen btn</label>
        <input type="checkbox" id="showFs" checked>
      </div>

      <div class="prop-row">
        <label>rotation direction</label>
        <select id="direction" style="font-size:13px;padding:3px 6px;border-radius:4px;border:1px solid #ddd;">
          <option value="right" selected>right</option>
          <option value="left">left</option>
        </select>
      </div>

      <div class="prop-row">
        <label>high-res on zoom</label>
        <input type="checkbox" id="highResToggle">
      </div>
    </div>

    <!-- Event log -->
    <div class="card">
      <h2>Event log</h2>
      <div id="log"></div>
    </div>

  </div>
</div>

<!-- Load the built ESM bundle -->
<script type="module">
  import './dist/viewer-360.esm.js';

  const viewer   = document.getElementById('viewer');
  const status   = document.getElementById('status');
  const log      = document.getElementById('log');
  const TOTAL    = 32;

  // ── Frame URLs ───────────────────────────────────────────────────────────────
  // Populated via file upload or URL input below — starts empty.
  let frames       = [];
  let highResFrames = [];

  function loadFrames(stdUrls, hiUrls = []) {
    frames        = stdUrls;
    highResFrames = hiUrls;
    viewer.images        = frames;
    viewer.highResImages = highResFrames.length ? highResFrames : [];
    viewer.frame  = 1;
    status.textContent = `✓ Loaded ${frames.length} frames${hiUrls.length ? ' + high-res' : ''} — drag to rotate, double-click to zoom.`;
  }

  // ── Wire up event log ─────────────────────────────────────────────────────────
  function logEvent(name, detail = {}) {
    const now     = new Date().toLocaleTimeString('en', { hour12: false });
    const entry   = document.createElement('div');
    entry.className = 'entry';
    const detailStr = Object.keys(detail).length
      ? ' ' + JSON.stringify(detail)
      : '';
    entry.innerHTML =
      `<span class="ts">${now}</span>` +
      `<span class="ev">${name}</span>` +
      `<span class="detail">${detailStr}</span>`;
    log.prepend(entry);
    // Keep max 30 entries
    while (log.children.length > 30) log.removeChild(log.lastChild);
  }

  viewer.addEventListener('viewer360:ready',           ()  => logEvent('ready'));
  viewer.addEventListener('viewer360:framechange',     (e) => logEvent('framechange',     e.detail));
  viewer.addEventListener('viewer360:zoomchange',      (e) => logEvent('zoomchange',      e.detail));
  viewer.addEventListener('viewer360:autorotatechange',(e) => logEvent('autorotatechange',e.detail));
  viewer.addEventListener('viewer360:close',           ()  => logEvent('close'));
  viewer.addEventListener('viewer360:error',           (e) => logEvent('error',           e.detail));

  // ── Live prop controls ────────────────────────────────────────────────────────
  const speedSlider = document.getElementById('speedSlider');
  const speedVal    = document.getElementById('speedVal');
  speedSlider.addEventListener('input', () => {
    speedVal.textContent = speedSlider.value;
    viewer.speed = Number(speedSlider.value);
  });

  document.getElementById('showControls').addEventListener('change', (e) => {
    viewer.showControls = e.target.checked;
  });
  document.getElementById('showZoom').addEventListener('change', (e) => {
    viewer.showZoomButtons = e.target.checked;
  });
  document.getElementById('showFs').addEventListener('change', (e) => {
    viewer.showFullscreenButton = e.target.checked;
  });
  document.getElementById('direction').addEventListener('change', (e) => {
    viewer.rotationDirection = e.target.value;
  });

  document.getElementById('highResToggle').addEventListener('change', (e) => {
    if (e.target.checked) {
      viewer.highResImages = highResFrames;
      status.textContent = 'High-res enabled — zoom in to see the swap (same 4K images used here).';
    } else {
      viewer.highResImages = [];
      status.textContent = 'High-res disabled.';
    }
  });

  // ── Expose viewer to inline onclick handlers ──────────────────────────────────
  window.viewer = viewer;

  // ── Initial state ─────────────────────────────────────────────────────────────
  viewer.speed  = 100;
  status.textContent = 'Paste image URLs below or upload local files to get started.';
</script>

</body>
</html>
